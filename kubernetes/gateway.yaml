apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: stopphish
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: stopphish-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: gateway
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-secrets
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: stopphish
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
