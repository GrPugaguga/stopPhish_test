services:
  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - users-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d users_db']
      interval: 5s
      timeout: 5s
      retries: 5

  notes-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - notes-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d notes_db']
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    ports:
      - '4222:4222'
      - '8222:8222'
    command: '--http_port 8222 --user nats --pass natspassword'
    networks:
      - app-network

  gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: gateway
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      USERS_DB_HOST: users-db
      USERS_DB_PORT: 5432
      NOTES_DB_HOST: notes-db
      NOTES_DB_PORT: 5432
      NATS_URL: nats://nats:4222
    depends_on:
      users-db:
        condition: service_healthy
      notes-db:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - app-network

  users:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: users
    env_file: .env
    environment:
      USERS_DB_HOST: users-db
      USERS_DB_PORT: 5432
      NATS_URL: nats://nats:4222
    depends_on:
      users-db:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - app-network

  notes:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: notes
    env_file: .env
    environment:
      NOTES_DB_HOST: notes-db
      NOTES_DB_PORT: 5432
      NATS_URL: nats://nats:4222
    depends_on:
      notes-db:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - '8080:80'
    depends_on:
      - gateway
    networks:
      - app-network

volumes:
  users-db-data:
  notes-db-data:

networks:
  app-network:
    driver: bridge
